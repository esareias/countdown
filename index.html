<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    :root {
        --neon-cyan: #00f3ff;
        --neon-pink: #bc13fe;
        --neon-yellow: #ffee00;
        --bg-dark: #050505;
        --grid-color: rgba(0, 243, 255, 0.15);
    }

    body {
        background-color: var(--bg-dark);
        color: var(--neon-cyan);
        font-family: 'Orbitron', sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        /* Scales the entire background grid */
        background-image: 
            linear-gradient(var(--grid-color) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
        background-size: 5vmin 5vmin;
    }

    .logo-container {
        text-align: center;
        margin-bottom: 3vmin;
        border: 0.5vmin solid var(--neon-cyan);
        padding: 2vmin 4vmin;
        background: rgba(0, 20, 30, 0.8);
        clip-path: polygon(5% 0, 100% 0, 100% 70%, 95% 100%, 0 100%, 0 30%);
        box-shadow: 0 0 2vmin var(--neon-cyan);
    }

    h1 { 
        font-size: 6vmin; /* Scales with the window size */
        margin: 0; 
        letter-spacing: 1vmin; 
        color: #fff; 
        text-shadow: 0.5vmin 0 var(--neon-pink), -0.5vmin 0 var(--neon-cyan); 
    }

    .sub-text { 
        display: block; 
        font-size: 1.5vmin; 
        color: var(--neon-yellow); 
        margin-top: 1vmin; 
    }

    .countdown-container { 
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 2vmin; 
        width: 90vw;
        max-width: 800px;
    }

    .time-box {
        background: rgba(0,0,0,0.8);
        padding: 2vmin;
        border: 0.3vmin solid var(--neon-pink);
        box-shadow: 0 0 2vmin var(--neon-pink);
        text-align: center;
    }

    .number { 
        font-size: 8vmin; /* The magic number for responsiveness */
        font-weight: bold; 
        color: #fff; 
        text-shadow: 0 0 2vmin var(--neon-pink); 
    }

    .label { 
        font-size: 1.2vmin; 
        color: var(--neon-cyan); 
        letter-spacing: 0.3vmin; 
        margin-top: 1vmin; 
    }
</style>
